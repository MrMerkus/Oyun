<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Poz Eşleştirme Oyunu v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #00e5cc;
      --pink: #ff4081;
      --yellow: #ffd600;
      --green: #69ff47;
      --red: #ff1744;
      --bg: #050a0e;
      --bg2: #0a1520;
      --bg3: #0f1e2e;
      --border: #1a3040;
      --text: #cce8e0;
      --text-dim: #5a8a80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace;
      min-height: 100vh; padding: 8px; display: flex; flex-direction: column; gap: 8px;
    }
    
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo-area { display: flex; align-items: center; gap: 8px; }
    h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; color: var(--teal); letter-spacing: 1px; }
    .stat-pill { background: var(--bg3); border: 1px solid var(--border); padding: 4px 10px; font-size: 9px; border-radius: 16px; font-weight: 700;}

    /* DÖRTLÜ PANEL DÜZENİ */
    .quad-panels {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 700px) { .quad-panels { grid-template-columns: 1fr; grid-template-rows: auto; } }

    .tp-panel { position: relative; aspect-ratio: 16/9; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tp-panel canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .tp-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 700; color: var(--teal); background: rgba(5,10,14,0.85); padding: 4px 10px; border-radius: 4px; z-index: 5; border: 1px solid var(--border); }

    .ref-highlight { border: 2px solid var(--pink) !important; box-shadow: 0 0 15px rgba(255, 64, 129, 0.2); }
    .ref-highlight .tp-label { color: var(--pink); border-color: var(--pink); }

    .cam-controls { display: flex; gap: 8px; justify-content: center; padding: 10px 0; }
    .btn { padding: 10px 20px; border: none; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; border-radius: 8px; transition: 0.2s; background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
    .btn:active { transform: scale(0.95); }
    .btn:hover { border-color: var(--teal); color: var(--teal); }

    video#webcam { display: none; } /* Videoyu arka planda tutuyoruz */
  </style>
</head>
<body>

  <header>
    <div class="logo-area">
      <span style="font-size:24px;">🎮</span>
      <h1>POZ EŞLEŞTİRME: REFERANS MODU</h1>
    </div>
    <div class="header-stats">
      <div class="stat-pill">SKOR: <span id="score-val" style="color:var(--pink)">0</span></div>
      <div class="stat-pill" id="model-badge">● YÜKLENİYOR</div>
    </div>
  </header>

  <div class="quad-panels">
    <div class="tp-panel">
      <canvas id="tp_raw"></canvas>
      <div class="tp-label">📷 OYUN EKRANI</div>
    </div>

    <div class="tp-panel">
      <canvas id="tp_skeleton"></canvas>
      <div class="tp-label">🦴 SİZİN İSKELETİNİZ</div>
    </div>

    <div class="tp-panel">
      <canvas id="tp_combined"></canvas>
      <div class="tp-label">🔬 ANALİZ KARIŞIMI</div>
    </div>

    <div class="tp-panel ref-highlight">
      <canvas id="tp_reference"></canvas>
      <div class="tp-label">🎯 YAPILACAK ŞEKİL (REFERANS)</div>
    </div>
  </div>

  <div class="cam-controls">
    <video id="webcam" autoplay playsinline></video>
    <button class="btn" id="btnReset">SKORU SIFIRLA</button>
    <button class="btn" id="btnFlip">KAMERA DEĞİŞTİR</button>
  </div>

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("webcam");
const modelBadge = document.getElementById("model-badge");
const scoreVal = document.getElementById("score-val");
const btnReset = document.getElementById("btnReset");
const btnFlip = document.getElementById("btnFlip");

const canvases = {
  raw: document.getElementById("tp_raw"),
  skel: document.getElementById("tp_skeleton"),
  comb: document.getElementById("tp_combined"),
  ref: document.getElementById("tp_reference")
};
const ctxs = {
  raw: canvases.raw.getContext("2d"),
  skel: canvases.skel.getContext("2d"),
  comb: canvases.comb.getContext("2d"),
  ref: canvases.ref.getContext("2d")
};

let poseLM, running = false, lastTime = -1, currentFacing = "user", gameScore = 0, currentPoseIdx = 0, matchHoldFrames = 0, poseHistory = [];
const REQUIRED_HOLD_FRAMES = 20, maxHistory = 30;

// REFERANS POZLAR İÇİN İSKELET ŞABLONLARI (0-1 normalize koordinatlar)
const TARGET_POSES = [
  {
    name: "T-POZU",
    angles: { LShoulder: 90, RShoulder: 90, LElbow: 180, RElbow: 180 },
    refPoints: [
      {id: 11, x: 0.4, y: 0.3}, {id: 12, x: 0.6, y: 0.3}, // Omuzlar
      {id: 13, x: 0.2, y: 0.3}, {id: 14, x: 0.8, y: 0.3}, // Dirsekler
      {id: 15, x: 0.1, y: 0.3}, {id: 16, x: 0.9, y: 0.3}, // Eller
      {id: 23, x: 0.45, y: 0.6}, {id: 24, x: 0.55, y: 0.6}, // Kalça
      {id: 27, x: 0.45, y: 0.9}, {id: 28, x: 0.55, y: 0.9}  // Ayaklar
    ]
  },
  {
    name: "Y-POZU",
    angles: { LShoulder: 160, RShoulder: 160, LElbow: 180, RElbow: 180 },
    refPoints: [
      {id: 11, x: 0.45, y: 0.4}, {id: 12, x: 0.55, y: 0.4},
      {id: 13, x: 0.3, y: 0.2}, {id: 14, x: 0.7, y: 0.2},
      {id: 15, x: 0.2, y: 0.1}, {id: 16, x: 0.8, y: 0.1},
      {id: 23, x: 0.48, y: 0.6}, {id: 24, x: 0.52, y: 0.6},
      {id: 27, x: 0.45, y: 0.9}, {id: 28, x: 0.55, y: 0.9}
    ]
  },
  {
    name: "TEK AYAK (TURNA)",
    angles: { LShoulder: 90, RShoulder: 90, LKnee: 90, RKnee: 180 },
    refPoints: [
      {id: 11, x: 0.45, y: 0.3}, {id: 12, x: 0.55, y: 0.3},
      {id: 13, x: 0.3, y: 0.3}, {id: 14, x: 0.7, y: 0.3},
      {id: 23, x: 0.45, y: 0.6}, {id: 24, x: 0.55, y: 0.6},
      {id: 25, x: 0.35, y: 0.75}, {id: 26, x: 0.55, y: 0.75},
      {id: 27, x: 0.45, y: 0.75}, {id: 28, x: 0.55, y: 0.95}
    ]
  }
];

function getAngle(A, B, C) {
  if(!A || !B || !C || A.visibility < 0.4) return null;
  const bax = A.x - B.x, bay = A.y - B.y, bcx = C.x - B.x, bcy = C.y - B.y;
  const mag = Math.hypot(bax, bay) * Math.hypot(bcx, bcy);
  return mag ? Math.round(Math.acos(Math.max(-1, Math.min(1, (bax * bcx + bay * bcy) / mag))) * 180 / Math.PI) : null;
}

// REFERANS POZU ÇİZEN FONKSİYON
function drawReferencePose(ctxTarget, poseIdx, W, H) {
  const pose = TARGET_POSES[poseIdx];
  ctxTarget.clearRect(0, 0, W, H);
  ctxTarget.fillStyle = "#050a0e";
  ctxTarget.fillRect(0,0,W,H);

  ctxTarget.strokeStyle = "rgba(255, 64, 129, 0.4)";
  ctxTarget.lineWidth = 4;
  
  // Basit bir kukla iskelet çizimi
  pose.refPoints.forEach(p => {
    ctxTarget.beginPath();
    ctxTarget.arc(p.x * W, p.y * H, 6, 0, Math.PI * 2);
    ctxTarget.fillStyle = "#ff4081";
    ctxTarget.fill();
  });
}

function drawGameUI(ctxTarget, W, H, accuracy, poseName) {
  ctxTarget.fillStyle = "rgba(5,10,14,0.8)";
  ctxTarget.roundRect(15, 15, 240, 60, 10); ctxTarget.fill();
  ctxTarget.fillStyle = "#00e5cc";
  ctxTarget.font = "bold 16px Arial";
  ctxTarget.fillText(poseName, 30, 40);
  
  // Progress Bar
  ctxTarget.fillStyle = "#1a3040";
  ctxTarget.roundRect(30, 50, 200, 10, 5); ctxTarget.fill();
  ctxTarget.fillStyle = accuracy > 85 ? "#69ff47" : "#ffd600";
  ctxTarget.roundRect(30, 50, (accuracy / 100) * 200, 10, 5); ctxTarget.fill();
}

async function start() {
  const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  poseLM = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/1/pose_landmarker_heavy.task", delegate: "GPU" },
    runningMode: "VIDEO", numPoses: 1
  });
  
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing, width: 1280, height: 720 } });
  video.srcObject = stream;
  video.onloadeddata = () => { running = true; modelBadge.textContent = "● HAZIR"; modelBadge.classList.add("ready"); predict(); };
}

function predict() {
  if (!running) return;
  if (lastTime !== video.currentTime) {
    lastTime = video.currentTime;
    Object.values(canvases).forEach(c => { c.width = video.videoWidth; c.height = video.videoHeight; });
    const W = video.videoWidth, H = video.videoHeight;

    const res = poseLM.detectForVideo(video, performance.now());
    if (res.landmarks && res.landmarks[0]) {
      const lm = res.landmarks[0];
      
      // Analiz
      const target = TARGET_POSES[currentPoseIdx];
      const cur = {
        LShoulder: getAngle(lm[23], lm[11], lm[13]),
        RShoulder: getAngle(lm[24], lm[12], lm[14]),
        LElbow: getAngle(lm[11], lm[13], lm[15]),
        RElbow: getAngle(lm[12], lm[14], lm[16])
      };
      
      let diff = 0;
      Object.keys(target.angles).forEach(k => { if(cur[k]) diff += Math.abs(cur[k] - target.angles[k]); else diff += 50; });
      const accuracy = Math.max(0, 100 - (diff / 2));

      if(accuracy > 85) {
        matchHoldFrames++;
        if(matchHoldFrames > REQUIRED_HOLD_FRAMES) { gameScore += 100; scoreVal.innerText = gameScore; currentPoseIdx = (currentPoseIdx + 1) % TARGET_POSES.length; matchHoldFrames = 0; }
      }

      // Panel Çizimleri
      const mirror = currentFacing === "user";
      
      // 1. Oyun Paneli
      ctxs.raw.save(); if(mirror){ ctxs.raw.translate(W,0); ctxs.raw.scale(-1,1); }
      ctxs.raw.drawImage(video, 0, 0); ctxs.raw.restore();
      drawGameUI(ctxs.raw, W, H, accuracy, target.name);

      // 2. İskelet
      ctxs.skel.fillStyle = "#050a0e"; ctxs.skel.fillRect(0,0,W,H);
      drawSkeleton(ctxs.skel, lm, W, H, mirror);

      // 3. Birleşik
      ctxs.comb.drawImage(video, 0, 0);
      ctxs.comb.fillStyle = "rgba(0,0,0,0.4)"; ctxs.comb.fillRect(0,0,W,H);
      drawSkeleton(ctxs.comb, lm, W, H, mirror);

      // 4. REFERANS (Yeni Panel)
      drawReferencePose(ctxs.ref, currentPoseIdx, W, H);
    }
  }
  requestAnimationFrame(predict);
}

function drawSkeleton(ctxTarget, lm, W, H, mirror) {
  ctxTarget.save(); if(mirror){ ctxTarget.translate(W,0); ctxTarget.scale(-1,1); }
  ctxTarget.strokeStyle = "#00e5cc"; ctxTarget.lineWidth = 4;
  PoseLandmarker.POSE_CONNECTIONS.forEach(c => {
    const s = lm[c.start], e = lm[c.end];
    if(s.visibility > 0.4 && e.visibility > 0.4) {
      ctxTarget.beginPath(); ctxTarget.moveTo(s.x * W, s.y * H); ctxTarget.lineTo(e.x * W, e.y * H); ctxTarget.stroke();
    }
  });
  ctxTarget.restore();
}

btnReset.onclick = () => { gameScore = 0; scoreVal.innerText = "0"; currentPoseIdx = 0; };
btnFlip.onclick = async () => { currentFacing = currentFacing === "user" ? "environment" : "user"; await start(); };

start();
</script>
</body>
</html>
